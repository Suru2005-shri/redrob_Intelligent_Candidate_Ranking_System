ai_usage_summary: |
  Claude used for architecture discussion, code review, and debugging.
  No candidate profile data was sent to any external API.
  All ranking logic, feature engineering, and scoring weights are original work.
  The final ranker runs 100% locally with no network access during ranking.

methodology_summary: |
  Multi-signal hybrid ranker with 5 scoring modules and a behavioral multiplier.
  
  The core insight: the JD explicitly warns about two failure modes — keyword stuffers 
  (Marketing Managers with all the AI skills listed) and ghost candidates (perfect profiles 
  who don't respond). The architecture directly addresses both.
  
  Profile quality = weighted sum of: Title+Career (28%), Skills (30%), Experience (20%),
  Location+Logistics (10%), Education (5%). Behavioral engagement acts as a MULTIPLIER 
  (0.70–1.15x) rather than an additive term — a great-profile ghost candidate gets penalized 
  multiplicatively, not just additively.
  
  Honeypot detection catches profiles with impossible career math, expert skills at 0 months,
  and other synthetic artifacts. Runtime: ~26s for 100K candidates, pure Python, no ML libs.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
